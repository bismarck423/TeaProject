<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>茶叶溯源系统 - 登录/注册</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #f0f4e8 0%, #d5e4cf 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(44, 81, 44, 0.1); width: 400px; }
        .title { color: #2c512c; text-align: center; margin-bottom: 30px; font-size: 24px; font-weight: bold; }
        .captcha-img { cursor: pointer; height: 40px; border-radius: 4px; }
        .submit-btn { background-color: #6b8e23 !important; border: none !important; width: 100%; }
    </style>
</head>
<body>
<div id="app">
    <div class="login-box">
        <div class="title">🍃 茶叶溯源平台</div>

        <el-tabs v-model="activeTab">
            <el-tab-pane label="账号登录" name="login">
                <el-form :model="loginForm" label-position="top">
                    <el-form-item label="用户名">
                        <el-input v-model="loginForm.username" placeholder="请输入用户名"></el-input>
                    </el-form-item>
                    <el-form-item label="密码">
                        <el-input v-model="loginForm.password" type="password" placeholder="请输入密码"></el-input>
                    </el-form-item>
                    <el-form-item label="验证码">
                        <div style="display: flex; gap: 10px; width: 100%;">
                            <el-input v-model="loginForm.code" placeholder="答案"></el-input>
                            <img :src="captchaUrl" @click="refreshCaptcha" class="captcha-img" title="点击刷新">
                        </div>
                    </el-form-item>
                    <el-button type="success" class="submit-btn" @click="handleLogin">立即登录</el-button>
                </el-form>
            </el-tab-pane>

            <el-tab-pane label="新用户注册" name="register">
                <el-form :model="regForm" label-position="top">
                    <el-form-item label="设置用户名">
                        <el-input v-model="regForm.username"></el-input>
                    </el-form-item>
                    <el-form-item label="设置密码">
                        <el-input v-model="regForm.password" type="password"></el-input>
                    </el-form-item>
                    <el-form-item label="账户类型">
                        <el-radio-group v-model="regForm.role">
                            <el-radio label="USER">普通用户</el-radio>
                            <el-radio label="TEST_USER">测试用户(含沙箱权限)</el-radio>
                        </el-radio-group>
                    </el-form-item>
                    <el-button type="success" class="submit-btn" @click="handleRegister">注册账号</el-button>
                </el-form>
            </el-tab-pane>
        </el-tabs>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const activeTab = ref('login');
            const captchaUrl = ref('/api/auth/captcha?t=' + Date.now());
            const loginForm = ref({ username: '', password: '', code: '' });
            const regForm = ref({ username: '', password: '', role: 'USER' });

            const refreshCaptcha = () => {
                captchaUrl.value = '/api/auth/captcha?t=' + Date.now();
            };

            const handleLogin = async () => {
                try {
                    const res = await axios.post('/api/auth/login', loginForm.value);
                    // 关键点：将后端返回的 User 对象存入本地存储
                    localStorage.setItem('user', JSON.stringify(res.data));

                    ElementPlus.ElMessage.success('登录成功！');
                    location.href = 'index.html';
                } catch (err) {
                    ElementPlus.ElMessage.error(err.response.data.message || '登录失败');
                    refreshCaptcha();
                }
            };

            return { activeTab, captchaUrl, loginForm, regForm, refreshCaptcha, handleLogin };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
