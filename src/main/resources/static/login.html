<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>茶叶溯源系统 - 登录/注册</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        :root { --tea-main: #6b8e23; --tea-dark: #2c512c; }
        body {
            background: linear-gradient(135deg, #f0f4e8 0%, #d5e4cf 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", sans-serif;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(44, 81, 44, 0.15);
            width: 380px;
            text-align: center;
        }
        .title {
            color: var(--tea-dark);
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: bold;
        }
        .captcha-img { cursor: pointer; height: 38px; border-radius: 4px; border: 1px solid #eee;}
        .submit-btn {
            background-color: var(--tea-main) !important;
            border-color: var(--tea-main) !important;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            padding: 12px 0;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-box">
        <div class="title">🍃 茶叶溯源平台</div>

        <el-tabs v-model="activeTab" stretch>
            <el-tab-pane label="账号登录" name="login">
                <el-form :model="loginForm" style="margin-top: 20px;">
                    <el-form-item>
                        <el-input v-model="loginForm.username" placeholder="请输入用户名" size="large">
                            <template #prefix>👤</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-input v-model="loginForm.password" type="password" placeholder="请输入密码" size="large">
                            <template #prefix>🔒</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item>
                        <div style="display: flex; gap: 10px; width: 100%;">
                            <el-input v-model="loginForm.code" placeholder="验证码答案" size="large"></el-input>
                            <img :src="captchaUrl" @click="refreshCaptcha" class="captcha-img" title="点击刷新">
                        </div>
                    </el-form-item>
                    <el-button type="primary" class="submit-btn" @click="handleLogin" :loading="loading">立即登录</el-button>
                </el-form>
            </el-tab-pane>

            <el-tab-pane label="快速注册" name="register">
                <el-form :model="regForm" style="margin-top: 20px;">
                    <el-form-item>
                        <el-input v-model="regForm.username" placeholder="设置用户名" size="large"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-input v-model="regForm.password" type="password" placeholder="设置登录密码" size="large"></el-input>
                    </el-form-item>
                    <el-button type="success" class="submit-btn" @click="handleRegister" :loading="loading">注册账号</el-button>
                </el-form>
            </el-tab-pane>
        </el-tabs>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const activeTab = ref('login');
            const loading = ref(false);
            const captchaUrl = ref('/api/auth/captcha?t=' + Date.now());
            const loginForm = ref({ username: '', password: '', code: '' });
            const regForm = ref({ username: '', password: '' });

            const refreshCaptcha = () => {
                captchaUrl.value = '/api/auth/captcha?t=' + Date.now();
            };

            const handleLogin = async () => {
                try {
                    const res = await axios.post('/api/auth/login', loginForm.value);

                    // 【修改点】后端现在返回的是 Map，包含 { message: "SUCCESS", user: {...} }
                    // 直接存入 user 对象
                    localStorage.setItem('user', JSON.stringify(res.data.user));

                    ElementPlus.ElMessage.success('登录成功！');
                    setTimeout(() => location.href = 'index.html', 1000);
                } catch (err) {
                    console.error("登录报错详情:", err); // 在浏览器 F12 控制台看这个！

                    // 获取错误消息的兼容写法
                    let msg = '登录失败';
                    if (err.response && err.response.data && err.response.data.message) {
                        msg = err.response.data.message;
                    }
                    ElementPlus.ElMessage.error(msg);

                    refreshCaptcha();
                }
            };

            const handleRegister = async () => {
                if(!regForm.value.username || !regForm.value.password) {
                    return ElementPlus.ElMessage.warning('请填写完整信息');
                }
                loading.value = true;
                try {
                    // 强制设置角色为 USER
                    const res = await axios.post('/api/auth/register', {
                        ...regForm.value,
                        role: 'USER'
                    });
                    if(res.data === 'SUCCESS') {
                        ElementPlus.ElMessage.success('注册成功，请登录');
                        activeTab.value = 'login';
                        loginForm.value.username = regForm.value.username;
                    } else {
                        ElementPlus.ElMessage.error(res.data);
                    }
                } catch (err) {
                    ElementPlus.ElMessage.error('注册失败');
                } finally {
                    loading.value = false;
                }
            };

            return { activeTab, captchaUrl, loginForm, regForm, refreshCaptcha, handleLogin, handleRegister, loading };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
