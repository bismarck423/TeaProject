<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>茶文化馆 - 茶叶溯源系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        :root { --tea-dark: #2c512c; --bg: #f5f7fa; }
        body { margin: 0; background-color: var(--bg); font-family: "Helvetica Neue", Helvetica, "PingFang SC", sans-serif; }
        .navbar { background: var(--tea-dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .article-card { margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .article-card:hover { transform: translateY(-5px); }
        .article-content { padding: 20px; }
        .meta { color: #999; font-size: 12px; margin-top: 10px; }
        .video-box { width: 100%; height: 300px; background: #000; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div style="font-size: 20px; font-weight: bold;">📚 茶文化数字馆</div>
        <el-button text style="color:white" @click="location.href='index.html'">返回首页</el-button>
    </nav>

    <div class="container">
        <el-empty v-if="articles.length === 0" description="暂无文化内容，请管理员在后台发布"></el-empty>

        <el-row :gutter="20">
            <el-col :span="24" v-for="item in articles" :key="item.id">
                <el-card class="article-card" @click="openArticle(item)">
                    <div class="article-content">
                        <el-tag size="small" effect="dark">{{ item.category || '通用' }}</el-tag>
                        <h2 style="margin: 10px 0; color: #333;">{{ item.title }}</h2>
                        <p style="color: #666; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                            {{ item.content }}
                        </p>
                        <div class="meta">发布时间：{{ item.createTime }}</div>
                    </div>
                </el-card>
            </el-col>
        </el-row>
    </div>

    <el-dialog v-model="dialogVisible" :title="currentArticle.title" width="60%">
        <div v-if="currentArticle.videoUrl" class="video-box">
            <iframe :src="currentArticle.videoUrl" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
        <div style="line-height: 1.8; white-space: pre-wrap;">{{ currentArticle.content }}</div>
    </el-dialog>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const articles = ref([]);
            const dialogVisible = ref(false);
            const currentArticle = ref({});

            const loadData = async () => {
                try {
                    // 调用后端公开接口获取文章列表
                    const res = await axios.get('/api/tea/culture/list');
                    articles.value = res.data;
                } catch (e) {
                    console.error("加载失败");
                }
            };

            const openArticle = (item) => {
                currentArticle.value = item;
                dialogVisible.value = true;
            };

            onMounted(loadData);
            return { articles, dialogVisible, currentArticle, openArticle };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
